<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#131a2c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#6ea8ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ea8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="18" fill="url(#brand)"/>
    <text x="40" y="40"
          text-anchor="middle"
          dominant-baseline="central"
          font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="800"
          font-size="38"
          letter-spacing="-1.5"
          fill="#0a0e1a">CB</text>
    <text x="100" y="40"
          dominant-baseline="central"
          font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="700"
          font-size="28"
          fill="#ffffff">Context Bridge <tspan fill="#6b7691" font-weight="500">Works</tspan></text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="280"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600"
        font-size="22"
        letter-spacing="4"
        fill="#6ea8ff">AI STRATEGY &amp; IMPLEMENTATION</text>

  <!-- Headline -->
  <text x="80" y="360"
        font-family="Inter, system-ui, sans-serif"
        font-weight="800"
        font-size="76"
        letter-spacing="-2"
        fill="#ffffff">We build reasoning</text>
  <text x="80" y="445"
        font-family="Inter, system-ui, sans-serif"
        font-weight="800"
        font-size="76"
        letter-spacing="-2"
        fill="url(#brand)">engines that run</text>
  <text x="80" y="530"
        font-family="Inter, system-ui, sans-serif"
        font-weight="800"
        font-size="76"
        letter-spacing="-2"
        fill="#ffffff">your business.</text>

  <!-- Service tags -->
  <g transform="translate(80, 590)" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500">
    <text x="0" y="0" fill="#6ea8ff">RAG</text>
    <text x="80" y="0" fill="#6b7691">·</text>
    <text x="105" y="0" fill="#8b5cf6">MCP</text>
    <text x="195" y="0" fill="#6b7691">·</text>
    <text x="220" y="0" fill="#22d3ee">AGENTIC</text>
    <text x="360" y="0" fill="#6b7691">·</text>
    <text x="385" y="0" fill="#ffffff">WEB &amp; APPS</text>
  </g>

  <!-- CTA pill -->
  <g transform="translate(800, 555)">
    <rect width="320" height="56" rx="28" fill="url(#brand)"/>
    <text x="160" y="28"
          text-anchor="middle"
          dominant-baseline="central"
          font-family="Inter, system-ui, sans-serif"
          font-weight="700"
          font-size="22"
          letter-spacing="-0.3"
          fill="#0a0e1a">Try the live concierge →</text>
  </g>
</svg>
